{% load static %}

{% load static %}
<!-- En-tête sidebar -->
<div class="flex h-14 shrink-0 items-center gap-2.5 border-b border-gray-200 px-4">
  <img src="{% static 'img/logo.png' %}" alt="AquaTogo" class="h-8 w-8 object-contain" />
  <span class="text-base font-bold text-gray-900">AquaTogo</span>
</div>

<!-- Navigation -->
<nav class="flex flex-col gap-1 px-3 py-4 flex-1">

  <p class="px-3 pb-1 text-xs font-semibold uppercase tracking-wider text-gray-400">Général</p>

  <a href="{% url 'core:dashboard' %}"
     class="nav-link {% if request.resolver_match.app_name == 'core' and request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
    </svg>
    Tableau de bord
  </a>

  <div class="my-2 border-t border-gray-100"></div>
  <p class="px-3 pb-1 text-xs font-semibold uppercase tracking-wider text-gray-400">Stock & Ventes</p>

  <a href="{% url 'products:list' %}"
     class="nav-link {% if request.resolver_match.app_name == 'products' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
    </svg>
    Produits
  </a>

  <a href="{% url 'services:list' %}"
     class="nav-link {% if request.resolver_match.app_name == 'services' and request.resolver_match.url_name != 'execution_list' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l5.653-4.655" />
    </svg>
    Prestations
  </a>

  <a href="{% url 'sales:list' %}"
     class="nav-link {% if request.resolver_match.app_name == 'sales' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75" />
    </svg>
    Ventes
  </a>

  <div class="my-2 border-t border-gray-100"></div>
  <p class="px-3 pb-1 text-xs font-semibold uppercase tracking-wider text-gray-400">Relation client</p>

  <a href="{% url 'clients:list' %}"
     class="nav-link {% if request.resolver_match.app_name == 'clients' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
    </svg>
    Clients
  </a>

  <a href="{% url 'services:execution_list' %}"
     class="nav-link {% if request.resolver_match.app_name == 'services' and request.resolver_match.url_name == 'execution_list' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
    </svg>
    Rappels
  </a>

  <div class="my-2 border-t border-gray-100"></div>
  <p class="px-3 pb-1 text-xs font-semibold uppercase tracking-wider text-gray-400">Finance</p>

  <a href="#"
     class="nav-link {% if request.resolver_match.app_name == 'accounting' %}active{% endif %}">
    <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
    </svg>
    Dépenses
  </a>

</nav>

<!-- Pied sidebar : utilisateur connecté -->
<div class="border-t border-gray-200 px-4 py-3">
  <div class="flex items-center gap-3">
    <a href="{% url 'core:profile' %}"
       class="flex items-center gap-3 min-w-0 flex-1 rounded-lg hover:bg-gray-50 transition-colors -mx-1 px-1 py-0.5"
       title="Mon profil">
      <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-brand-100 text-brand-700 text-sm font-bold">
        {{ request.user.username|first|upper }}
      </div>
      <div class="min-w-0">
        <p class="truncate text-sm font-medium text-gray-900">{{ request.user.username }}</p>
        <p class="truncate text-xs text-gray-400">Profil & Paramètres</p>
      </div>
    </a>
    <form method="post" action="{% url 'core:logout' %}" class="ml-auto">
      {% csrf_token %}
      <button type="submit"
              class="shrink-0 p-1 text-gray-400 hover:text-red-500 transition-colors"
              title="Déconnexion">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
      </button>
    </form>
  </div>
</div>
